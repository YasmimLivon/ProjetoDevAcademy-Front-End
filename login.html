<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div id="message-box"></div>
    <div id="login-section">
    <h2>Entrar no Sistemas</h2>

    <form id="login-form">

    <div class="form-group">
    <label for="login-email">Email:</label>
    <input type="text" id="login-email" required placeholder="seu@gmail.com">
    </div>

    <div class="form-group">
    <label for="login-password">Senha:</label>
    <input type="password" id="login-password" required placeholder="*******">
    </div>

    <button type="submit" id="login-btn">Entrar</button>

    </form>

    <div class="nav-link-container">
        <span>Não tem uma conta?</span>
        <a href="register.html">registrar-se</a>

    </div>
    </div>

    <div id="dashboard-section" class="hidden">
    <h2>Painel Protegido</h2>
    <p>Olá, você está logado!</p>
    <button id="fetch-data-btn" class="btn-outline">Buscar Dados</button>
    <div id="api-data" class="api-data-box"></div>
    <button id="logout-btn">Sair</button>
    </div>

    </div>

    <script src="./register.js"></script>
</body>
</html>
