<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

    <div id="message-box"></div>

    <div id="registrar-sessao">
    
        <form id="register-form">
        <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="name" required placeholder="Seu nome completo">
        </div>

        <div class="form-group">
        <label for="email">Email:</label>
        <input type="text" id="login-email" required placeholder="seu@gmail.com">
        </div>

        <div class="form-group">
        <label for="login-password">Senha:</label>
        <input type="password" id="login-password" required placeholder="*******">
        </div>

        <div class="form-group">
        <label for="login-password">Confirmar Senha:</label>
        <input type="password" id="confirmar-senha" required placeholder="*******">
        </div>

        <div class="form-group">
        <label for="role">Tipo de usuário:</label>
        <select id="role" required>
        <option value="">Selecione um tipo</option>
        <option value="Admin">Admistrador</option>
        <option value="Professor">Professor</option>
        <option value="Aluno">Aluno</option>
        </select>
        </div>
        <button id= "submit-btn" type="submit">Registrar-se</button>
        </form>

        <div class="toggle-form">
        <p>Já tem uma conta? <a href="login.html">Entrar</a></p>
        </div>
    </div>
</div>

    <script src="./register.js" defer></script>
</body>
</html>
